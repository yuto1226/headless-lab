styling_hooks: []
dependencies:
  css_files:
  - dropdown.css
  - menu.css
  - button.css
  javascript:
  - dropdown.js
  - menu.js
  icons:
  - utility-sprite.svg
  other_components:
  - button
  - dropdown
  - truncate
related_components:
- name: Button Menu
  relationship: container
  description: Button that triggers menu dropdown
- name: Popover
  relationship: similar
  description: Alternative overlay for contextual content
- name: Navigation
  relationship: alternative
