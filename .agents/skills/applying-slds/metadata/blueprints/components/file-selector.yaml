  - file-selector.css
  - button.css
  - progress-bar.css
  - spinner.css
  javascript:
  - file-selector.js
  icons:
  - utility-sprite.svg
  - doctype-sprite.svg
  other_components:
  - button
  - progress-bar
  - spinner
  - form-element
