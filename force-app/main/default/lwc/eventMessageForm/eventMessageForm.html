<template>
    <lightning-card title="LTイベント受付">
        <div class="slds-p-around_medium event-form">
            <template if:true={isBusy}>
                <lightning-spinner
                    alternative-text="送信中"
                    size="small">
                </lightning-spinner>
            </template>

            <template if:true={feedbackMessage}>
                <div class={feedbackClass} role="status">
                    <span class="slds-assistive-text">{feedbackTitle}</span>
                    <h2>{feedbackMessage}</h2>
                </div>
            </template>

            <lightning-combobox
                name="attendeeRole"
                label="Salesforceのご利用方法"
                value={attendeeRole}
                placeholder="選択してください"
                options={attendeeRoleOptions}
                required
                disabled={isBusy}
                onchange={handleRoleChange}>
            </lightning-combobox>

            <lightning-textarea
                class="slds-m-top_medium"
                name="enthusiasm"
                label="意気込み"
                value={enthusiasm}
                required
                max-length="1000"
                disabled={isBusy}
                onchange={handleEnthusiasmChange}>
            </lightning-textarea>

            <div class="event-form__actions">
                <lightning-button
                    variant="brand"
                    label="送信する"
                    stretch
                    onclick={handleSubmit}
                    disabled={isBusy}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
